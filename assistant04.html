<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>دستیار ۰۴</title>
  <style>
    /* ---- فونت و ریست ---- */
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0f14;
      --surface: #161a23;
      --card:    #1e2330;
      --border:  #2a3045;
      --accent:  #6c8bff;
      --accent2: #a78bfa;
      --danger:  #f87171;
      --success: #34d399;
      --text:    #e8ecf4;
      --muted:   #7a859e;
      --radius:  14px;
      --msg-r:   16px;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Vazirmatn', Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 600px;
      margin: 0 auto;
    }

    /* ---- هدر ---- */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .back-btn {
      background: none; border: none;
      color: var(--accent);
      font-size: 1.3rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      transition: background .15s;
      text-decoration: none;
    }
    .back-btn:hover { background: rgba(108,139,255,.1); }

    .agent-avatar {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .agent-info { flex: 1; }
    .agent-name { font-weight: 700; font-size: 1rem; }
    .agent-status {
      font-size: .72rem;
      color: var(--success);
      display: flex; align-items: center; gap: 4px;
    }
    .agent-status::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
      display: inline-block;
    }

    /* ---- ناحیه پیام‌ها ---- */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }
    /* اسکرول‌بار سفارشی */
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* حباب پیام */
    .msg {
      max-width: 85%;
      padding: 10px 14px;
      line-height: 1.6;
      font-size: .9rem;
      word-break: break-word;
      animation: fadeUp .2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* پیام دستیار (راست) */
    .msg.bot {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--msg-r) var(--msg-r) var(--msg-r) 4px;
      align-self: flex-end;
    }
    /* پیام کاربر (چپ) */
    .msg.user {
      background: rgba(108,139,255,.18);
      border: 1px solid rgba(108,139,255,.3);
      border-radius: var(--msg-r) var(--msg-r) 4px var(--msg-r);
      align-self: flex-start;
      color: #c5d0ff;
    }

    /* تایم‌استمپ */
    .msg-time {
      font-size: .68rem;
      color: var(--muted);
      margin-top: 3px;
      text-align: left;
    }

    /* ---- دکمه‌های سریع ---- */
    .quick-btns {
      padding: 8px 16px 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .qbtn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: .78rem;
      cursor: pointer;
      transition: background .15s, border-color .15s;
      font-family: inherit;
    }
    .qbtn:hover, .qbtn:active {
      background: rgba(108,139,255,.2);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ---- ورودی پیام ---- */
    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 10px 16px 14px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .msg-input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: .9rem;
      padding: 10px 14px;
      resize: none;
      line-height: 1.5;
      max-height: 120px;
      outline: none;
      transition: border-color .15s;
    }
    .msg-input:focus { border-color: var(--accent); }
    .msg-input::placeholder { color: var(--muted); }

    .send-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      width: 44px; height: 44px;
      border-radius: 12px;
      font-size: 1.2rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .15s, transform .1s;
      display: flex; align-items: center; justify-content: center;
    }
    .send-btn:hover  { background: #8ba3ff; }
    .send-btn:active { transform: scale(.93); }

    /* ---- یادداشت‌ها (پنل مخفی) ---- */
    .notes-panel {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 100;
      align-items: flex-end;
    }
    .notes-panel.open { display: flex; }
    .notes-inner {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      border-top: 1px solid var(--border);
      padding: 20px 16px;
      width: 100%;
      max-height: 75vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .notes-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      font-size: 1rem;
    }
    .close-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
    }
    .notes-textarea {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: .9rem;
      padding: 10px;
      resize: none;
      height: 160px;
      outline: none;
    }
    .notes-textarea:focus { border-color: var(--accent); }
    .notes-actions { display: flex; gap: 8px; }
    .btn-save {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-family: inherit;
      font-size: .88rem;
      cursor: pointer;
      flex: 1;
    }
    .btn-clear {
      background: rgba(248,113,113,.15);
      color: var(--danger);
      border: 1px solid rgba(248,113,113,.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-family: inherit;
      font-size: .88rem;
      cursor: pointer;
    }
    .notes-saved {
      font-size: .75rem;
      color: var(--success);
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>

  <!-- هدر / نوار بالا -->
  <div class="topbar">
    <a href="index.html" class="back-btn" title="بازگشت">›</a>
    <div class="agent-avatar">⚡</div>
    <div class="agent-info">
      <div class="agent-name">دستیار ۰۴</div>
      <div class="agent-status">آنلاین — آفلاین کامل</div>
    </div>
  </div>

  <!-- ناحیه پیام‌ها -->
  <div class="chat-area" id="chatArea"></div>

  <!-- دکمه‌های سریع -->
  <div class="quick-btns">
    <button class="qbtn" onclick="quickAsk('ساعت چنده؟')">🕐 ساعت</button>
    <button class="qbtn" onclick="quickAsk('امروز چه تاریخی‌ه؟')">📅 تاریخ</button>
    <button class="qbtn" onclick="quickAsk('حساب کتاب')">🔢 ماشین‌حساب</button>
    <button class="qbtn" onclick="openNotes()">📝 یادداشت</button>
    <button class="qbtn" onclick="quickAsk('راهنما')">❓ راهنما</button>
    <button class="qbtn" onclick="quickAsk('خداحافظ')">👋 خداحافظ</button>
  </div>

  <!-- ورودی پیام -->
  <div class="input-row">
    <textarea
      id="msgInput"
      class="msg-input"
      placeholder="پیام خود را بنویسید…"
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" onclick="sendMsg()" title="ارسال">⬆</button>
  </div>

  <!-- پنل یادداشت -->
  <div class="notes-panel" id="notesPanel" onclick="closeNotesOutside(event)">
    <div class="notes-inner" id="notesInner">
      <div class="notes-header">
        <span>📝 یادداشت‌های من</span>
        <button class="close-btn" onclick="closeNotes()">بستن</button>
      </div>
      <textarea id="notesText" class="notes-textarea" placeholder="هر چیزی که می‌خواهید یادداشت کنید…"></textarea>
      <div class="notes-actions">
        <button class="btn-save" onclick="saveNotes()">💾 ذخیره</button>
        <button class="btn-clear" onclick="clearNotes()">🗑 پاک کردن</button>
      </div>
      <div class="notes-saved" id="notesSaved">✓ ذخیره شد</div>
    </div>
  </div>

<script>
// ---- ایمنی: escape برای جلوگیری از XSS ----
function escapeHtml(str) {
  const div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

// ---- تاریخ شمسی (بدون کتابخانه خارجی) ----
function gregorianToJalali(gy, gm, gd) {
  const g_d_no = [31,28,31,30,31,30,31,31,30,31,30,31];
  const j_d_no = [31,31,30,30,31,31,30,31,30,29,30,30,29];
  if (gy > 1600) { gy -= 1600; } else { gy -= 1601; }
  let g_d = (365 * gy) + (Math.floor(gy/4)) - (Math.floor(gy/100)) + (Math.floor(gy/400));
  for (let i = 0; i < gm - 1; i++) g_d += g_d_no[i];
  if (gm > 2 && (gy%4===0 && (gy%100!==0 || gy%400===0))) g_d++;
  g_d += gd - 1;
  let j_y = 979, j_m = 0, j_d = 0;
  let j_np = Math.floor(g_d / 12053); g_d %= 12053;
  j_y += 33 * j_np;
  j_np = Math.floor(g_d / 365);
  if (j_np >= 8) { j_np = 8; g_d = 0; } else g_d %= 365;
  j_y += 4 * j_np;
  for (let i = 0; i < 8; i++) {
    let j_days = (i === 1 || i === 5) ? 366 : 365;
    if (g_d >= j_days) { g_d -= j_days; j_y++; } else break;
  }
  for (let i = 0; i < 11; i++) {
    if (g_d >= j_d_no[i]) { g_d -= j_d_no[i]; j_m++; } else break;
  }
  j_d = g_d + 1;
  return [j_y, j_m + 1, j_d];
}

function getPersianDate() {
  const now = new Date();
  const [jy, jm, jd] = gregorianToJalali(now.getFullYear(), now.getMonth()+1, now.getDate());
  const months = ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور',
                  'مهر','آبان','آذر','دی','بهمن','اسفند'];
  const days = ['یکشنبه','دوشنبه','سه‌شنبه','چهارشنبه','پنجشنبه','جمعه','شنبه'];
  const dayName = days[now.getDay()];
  return `${dayName} ${jd} ${months[jm-1]} ${jy}`;
}

function getTime() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  return `${h}:${m}:${s}`;
}

// ---- موتور پاسخ قانون‌محور ----
const rules = [
  {
    test: /ساعت|وقت|چند(ه|ست)/,
    reply: () => `🕐 ساعت الان: **${getTime()}**`
  },
  {
    test: /تاریخ|امروز|روز/,
    reply: () => `📅 امروز: **${getPersianDate()}**`
  },
  {
    test: /حساب|محاسب|ماشین/,
    reply: () => `🔢 یک عبارت ریاضی بنویسید.\nمثال: **32 * 7** یا **100 / 4 + 5**`
  },
  {
    // پردازش عبارت ریاضی ساده (امن: فقط اعداد و عملگرها)
    test: /^[\d\s\+\-\*\/\.\(\)%^]+$/,
    reply: (input) => {
      try {
        // حذف هر چیز غیر از اعداد/عملگر برای امنیت
        const safe = input.replace(/[^0-9+\-*/().\s%]/g, '');
        // eslint-disable-next-line no-new-func
        const result = Function('"use strict"; return (' + safe + ')')();
        if (!isFinite(result)) return '⚠️ نتیجه تعریف نشده (مثلاً تقسیم بر صفر)';
        return `= **${result}**`;
      } catch {
        return '⚠️ عبارت ریاضی معتبر نیست.';
      }
    }
  },
  {
    test: /راهنما|کمک|help|چیکار|چی میتون/i,
    reply: () =>
`📖 **راهنمای دستیار ۰۴**

من می‌توانم:
• 🕐 گفتن ساعت دقیق
• 📅 تاریخ شمسی امروز
• 🔢 انجام محاسبات ساده (مثال: 5 * 8)
• 📝 ذخیره یادداشت در حافظه گوشی
• 💬 مکالمه‌های ساده

برای یادداشت روی دکمه "یادداشت" بزنید.`
  },
  {
    test: /خدا(حافظ|فظ)|bye|فعلاً|بعداً|خداافظ/i,
    reply: () => `👋 خداحافظ! هر وقت خواستید برگردید. 😊`
  },
  {
    test: /سلام|درود|هلو|hello|hi/i,
    reply: () => `سلام! چطور می‌تونم کمکتون کنم؟ 😊`
  },
  {
    test: /ممنون|متشکر|تشکر|thanks/i,
    reply: () => `خواهش می‌کنم! 🙏 هر سوالی داشتید بپرسید.`
  },
  {
    test: /اسمت|نامت|کی هستی|چی هستی/,
    reply: () => `من دستیار ۰۴ هستم؛ یک دستیار سبک و کاملاً آفلاین. ⚡`
  },
  {
    // پیام پیش‌فرض
    test: /.*/,
    reply: () =>
`متوجه نشدم. 🤔
می‌توانید از دکمه‌های سریع استفاده کنید یا **راهنما** را بپرسید.`
  }
];

function getReply(input) {
  const trimmed = input.trim();
  for (const rule of rules) {
    if (rule.test.test(trimmed)) {
      return rule.reply(trimmed);
    }
  }
  return 'متوجه نشدم.';
}

// ---- نمایش پیام ----
function renderMarkdown(text) {
  // فقط bold (**...**) را رندر می‌کنیم — ساده و امن
  return escapeHtml(text).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
}

function addMessage(text, role) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const now = new Date();
  const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  div.innerHTML = `<div>${renderMarkdown(text)}</div><div class="msg-time">${time}</div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

// ---- ارسال پیام ----
function sendMsg() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  addMessage(text, 'user');
  input.value = '';
  input.style.height = 'auto';
  // تأخیر کوتاه برای احساس طبیعی‌تر
  setTimeout(() => {
    const reply = getReply(text);
    addMessage(reply, 'bot');
  }, 180);
}

function quickAsk(text) {
  const input = document.getElementById('msgInput');
  input.value = text;
  sendMsg();
}

// ارسال با Enter (بدون Shift)
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
}

// تغییر ارتفاع خودکار textarea
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ---- یادداشت‌ها (localStorage) ----
function openNotes() {
  const panel = document.getElementById('notesPanel');
  const ta = document.getElementById('notesText');
  ta.value = localStorage.getItem('assistant04_notes') || '';
  panel.classList.add('open');
  ta.focus();
}
function closeNotes() {
  document.getElementById('notesPanel').classList.remove('open');
}
function closeNotesOutside(e) {
  if (e.target === document.getElementById('notesPanel')) closeNotes();
}
function saveNotes() {
  const text = document.getElementById('notesText').value;
  localStorage.setItem('assistant04_notes', text);
  const saved = document.getElementById('notesSaved');
  saved.style.display = 'block';
  setTimeout(() => saved.style.display = 'none', 1800);
}
function clearNotes() {
  if (!confirm('آیا مطمئنید؟ تمام یادداشت‌ها حذف می‌شوند.')) return;
  localStorage.removeItem('assistant04_notes');
  document.getElementById('notesText').value = '';
}

// ---- پیام خوش‌آمد اولیه ----
window.addEventListener('DOMContentLoaded', () => {
  const hour = new Date().getHours();
  let greet = hour < 12 ? 'صبح بخیر' : hour < 18 ? 'روز بخیر' : 'شب بخیر';
  addMessage(`${greet}! 👋 من دستیار ۰۴ هستم.\nاز دکمه‌های سریع استفاده کنید یا هر چیزی بنویسید.`, 'bot');
});
</script>
</body>
</html>
