<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>دستیار هوشمند</title>
  <style>
    /* ---- فونت و ریست ---- */
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0f14;
      --surface:  #161a23;
      --card:     #1e2330;
      --border:   #2a3045;
      --accent1:  #6c8bff;   /* آبی‌بنفش برای ۰۴ */
      --accent2:  #34c88a;   /* سبز برای WebLLM */
      --text:     #e8ecf4;
      --muted:    #7a859e;
      --radius:   18px;
    }

    body {
      font-family: 'Vazirmatn', Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* ---- هدر ---- */
    .header {
      text-align: center;
      margin-bottom: 48px;
    }
    .logo {
      width: 64px; height: 64px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin: 0 auto 20px;
      box-shadow: 0 8px 32px rgba(108,139,255,.3);
    }
    .header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -.5px;
      margin-bottom: 8px;
    }
    .header p {
      font-size: .95rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ---- کارت‌های دکمه ---- */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 400px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 20px;
      text-decoration: none;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 18px;
      transition: transform .2s, box-shadow .2s, border-color .2s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity .25s;
    }
    .card:hover { transform: translateY(-3px); }
    .card:active { transform: scale(.98); }

    /* رنگ خط کنار کارت */
    .card-04   { border-right: 3px solid var(--accent1); }
    .card-llm  { border-right: 3px solid var(--accent2); }
    .card-04:hover  { box-shadow: 0 12px 40px rgba(108,139,255,.2); border-color: var(--accent1); }
    .card-llm:hover { box-shadow: 0 12px 40px rgba(52,200,138,.2); border-color: var(--accent2); }

    .card-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .icon-04  { background: rgba(108,139,255,.15); }
    .icon-llm { background: rgba(52,200,138,.15); }

    .card-text { flex: 1; }
    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: .82rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .card-arrow {
      font-size: 1.2rem;
      color: var(--muted);
    }

    /* بج «آفلاین» */
    .badge {
      font-size: .68rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
      display: inline-block;
      margin-top: 6px;
    }
    .badge-04  { background: rgba(108,139,255,.15); color: var(--accent1); }
    .badge-llm { background: rgba(52,200,138,.15);  color: var(--accent2); }

    /* ---- فوتر ---- */
    footer {
      margin-top: 40px;
      font-size: .78rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- هدر اصلی -->
  <header class="header">
    <div class="logo">🤖</div>
    <h1>دستیار هوشمند</h1>
    <p>انتخاب کنید با کدام دستیار صحبت کنید</p>
  </header>

  <!-- کارت‌های منو -->
  <div class="cards">

    <!-- دستیار ۰۴ -->
    <a href="assistant04.html" class="card card-04">
      <div class="card-icon icon-04">⚡</div>
      <div class="card-text">
        <div class="card-title">دستیار ۰۴</div>
        <div class="card-desc">قانون‌محور، سریع و سبک<br>
          یادداشت، تاریخ، محاسبه
        </div>
        <span class="badge badge-04">۱۰۰٪ آفلاین</span>
      </div>
      <div class="card-arrow">‹</div>
    </a>

    <!-- دستیار WebLLM -->
    <a href="webllm_assistant.html" class="card card-llm">
      <div class="card-icon icon-llm">🧠</div>
      <div class="card-text">
        <div class="card-title">دستیار WebLLM</div>
        <div class="card-desc">هوش مصنوعی واقعی در مرورگر<br>
          مدل Phi-3-mini
        </div>
        <span class="badge badge-llm">آفلاین پس از بارگذاری</span>
      </div>
      <div class="card-arrow">‹</div>
    </a>

  </div>

  <footer>ساخته‌شده با ❤️ — کاملاً روی دستگاه شما اجرا می‌شود</footer>

</body>
</html>
