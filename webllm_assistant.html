<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>دستیار WebLLM</title>

  <!--
    =====================================================
    دستیار WebLLM — مدل Phi-3-mini-4k-instruct
    =====================================================
    نحوه کار:
    1. اولین بار مدل از CDN دانلود می‌شود (~2.3GB) و در IndexedDB ذخیره می‌شود.
    2. دفعات بعدی کاملاً آفلاین کار می‌کند.
    3. مدل فقط در مرورگرهای مدرن با WebGPU یا WASM اجرا می‌شود.
    4. Chrome/Edge روی PC بهترین عملکرد را دارند.
    =====================================================
  -->

  <!-- کتابخانه WebLLM از CDN (برای اولین بارگذاری نیاز به اینترنت دارد) -->
  <script src="https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.73/lib/index.js"></script>

  <style>
    /* ---- ریست و فونت ---- */
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0b0e17;
      --surface: #131720;
      --card:    #1a2030;
      --border:  #252e42;
      --accent:  #34c88a;   /* سبز تازه برای WebLLM */
      --accent2: #0ea5e9;
      --text:    #e4eaf6;
      --muted:   #6b7a9a;
      --danger:  #f87171;
      --radius:  14px;
    }

    html, body { height: 100%; }
    body {
      font-family: 'Vazirmatn', Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 600px;
      margin: 0 auto;
    }

    /* ---- هدر ---- */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .back-btn {
      background: none; border: none;
      color: var(--accent);
      font-size: 1.3rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      transition: background .15s;
      text-decoration: none;
    }
    .back-btn:hover { background: rgba(52,200,138,.1); }

    .agent-avatar {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .agent-info { flex: 1; }
    .agent-name { font-weight: 700; font-size: 1rem; }
    .agent-status {
      font-size: .72rem;
      color: var(--muted);
      display: flex; align-items: center; gap: 5px;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background .3s;
    }
    .status-dot.ready   { background: var(--accent); }
    .status-dot.loading { background: #facc15; animation: pulse 1s infinite; }
    .status-dot.error   { background: var(--danger); }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }

    .model-badge {
      font-size: .68rem;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(52,200,138,.12);
      color: var(--accent);
      border: 1px solid rgba(52,200,138,.25);
      white-space: nowrap;
    }

    /* ---- بنر بارگذاری ---- */
    .load-banner {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      flex-shrink: 0;
    }
    .load-banner.hidden { display: none; }

    .load-title {
      font-size: .85rem;
      font-weight: 500;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }
    .load-pct {
      color: var(--accent);
      font-weight: 700;
    }

    .progress-bar {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 3px;
      transition: width .4s ease;
      width: 0%;
    }

    .load-detail {
      font-size: .72rem;
      color: var(--muted);
      margin-top: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ---- ناحیه پیام‌ها ---- */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ---- حباب‌های پیام ---- */
    .msg {
      max-width: 88%;
      padding: 10px 14px;
      line-height: 1.65;
      font-size: .9rem;
      word-break: break-word;
      animation: fadeUp .2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.bot {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px 16px 16px 4px;
      align-self: flex-end;
    }
    .msg.user {
      background: rgba(52,200,138,.15);
      border: 1px solid rgba(52,200,138,.3);
      border-radius: 16px 16px 4px 16px;
      align-self: flex-start;
      color: #a7f3d0;
    }
    /* نشانگر "در حال تایپ" */
    .typing-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      margin: 0 2px;
      animation: bounce .9s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ---- ورودی پیام ---- */
    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 10px 16px 14px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .msg-input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: .9rem;
      padding: 10px 14px;
      resize: none;
      line-height: 1.5;
      max-height: 120px;
      outline: none;
      transition: border-color .15s;
    }
    .msg-input:focus { border-color: var(--accent); }
    .msg-input::placeholder { color: var(--muted); }
    .msg-input:disabled { opacity: .5; }

    .send-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      width: 44px; height: 44px;
      border-radius: 12px;
      font-size: 1.2rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .15s, transform .1s;
      display: flex; align-items: center; justify-content: center;
    }
    .send-btn:hover  { background: #56d9a4; }
    .send-btn:active { transform: scale(.93); }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* هشدار WebGPU */
    .warn-box {
      background: rgba(248,113,113,.1);
      border: 1px solid rgba(248,113,113,.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: .8rem;
      color: #fca5a5;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <!-- هدر -->
  <div class="topbar">
    <a href="index.html" class="back-btn">›</a>
    <div class="agent-avatar">🧠</div>
    <div class="agent-info">
      <div class="agent-name">دستیار WebLLM</div>
      <div class="agent-status">
        <div class="status-dot loading" id="statusDot"></div>
        <span id="statusText">در حال آماده‌سازی…</span>
      </div>
    </div>
    <span class="model-badge">Phi-3-mini</span>
  </div>

  <!-- نوار پیشرفت بارگذاری مدل -->
  <div class="load-banner" id="loadBanner">
    <div class="load-title">
      <span>بارگذاری مدل هوش مصنوعی</span>
      <span class="load-pct" id="loadPct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="load-detail" id="loadDetail">اولین بار ~2.3GB دانلود می‌شود — بعداً آفلاین خواهد بود</div>
  </div>

  <!-- ناحیه پیام‌ها -->
  <div class="chat-area" id="chatArea"></div>

  <!-- ورودی -->
  <div class="input-row">
    <textarea
      id="msgInput"
      class="msg-input"
      placeholder="پیام خود را بنویسید…"
      rows="1"
      disabled
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button id="sendBtn" class="send-btn" onclick="sendMsg()" disabled>⬆</button>
  </div>

<script>
// ---- ایمنی: escape برای جلوگیری از XSS ----
function escapeHtml(str) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}

// ---- وضعیت برنامه ----
let engine = null;
let isGenerating = false;
const history = []; // تاریخچه مکالمه برای context

// ---- المان‌های DOM ----
const chatArea   = document.getElementById('chatArea');
const msgInput   = document.getElementById('msgInput');
const sendBtn    = document.getElementById('sendBtn');
const statusDot  = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const loadBanner = document.getElementById('loadBanner');
const loadPct    = document.getElementById('loadPct');
const progressFill = document.getElementById('progressFill');
const loadDetail = document.getElementById('loadDetail');

// ---- نمایش پیام ----
function addMessage(text, role, isTemp = false) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (isTemp) div.id = 'tempMsg';
  // برای پیام بات: markdown ساده، برای کاربر: escape کامل
  if (role === 'bot') {
    div.innerHTML = simpleMarkdown(text);
  } else {
    div.textContent = text;
  }
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div;
}

// رندر markdown ساده (امن)
function simpleMarkdown(text) {
  return escapeHtml(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,   '<em>$1</em>')
    .replace(/`(.+?)`/g,     '<code style="background:rgba(255,255,255,.08);padding:1px 5px;border-radius:4px">$1</code>')
    .replace(/\n/g, '<br>');
}

function addTypingIndicator() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typingMsg';
  div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}
function removeTypingIndicator() {
  const el = document.getElementById('typingMsg');
  if (el) el.remove();
}

// ---- بارگذاری مدل WebLLM ----
async function initEngine() {
  try {
    // بررسی پشتیبانی از WebGPU یا WASM
    if (!window.webllm) {
      addMessage('⚠️ کتابخانه WebLLM بارگذاری نشد. اتصال اینترنت برای اولین بار لازم است.', 'bot');
      setStatus('error', 'خطا در بارگذاری');
      return;
    }

    // تابع callback برای نمایش پیشرفت
    const initProgressCallback = (report) => {
      const pct = Math.round(report.progress * 100);
      loadPct.textContent = pct + '%';
      progressFill.style.width = pct + '%';
      // متن جزئیات را کوتاه می‌کنیم
      const detail = (report.text || '').substring(0, 80);
      loadDetail.textContent = detail || 'در حال پردازش…';
      setStatus('loading', `بارگذاری ${pct}%`);
    };

    // ساخت engine با مدل Phi-3-mini
    engine = await webllm.CreateMLCEngine(
      'Phi-3-mini-4k-instruct-q4f16_1-MLC',
      { initProgressCallback }
    );

    // آماده شد
    loadBanner.classList.add('hidden');
    setStatus('ready', 'آماده');
    msgInput.disabled = false;
    sendBtn.disabled  = false;
    msgInput.focus();

    addMessage(
      '**سلام!** 👋 من دستیار WebLLM هستم.\n' +
      'مدل Phi-3-mini روی دستگاه شما اجرا می‌شود — هیچ اطلاعاتی به سرور ارسال نمی‌شود.\n' +
      'هر سوالی دارید بپرسید!',
      'bot'
    );

  } catch (err) {
    console.error('WebLLM init error:', err);
    loadBanner.classList.add('hidden');
    setStatus('error', 'خطا');

    // نمایش پیام راهنمای خطا
    const errMsg = err.message || String(err);
    let userMsg = '⚠️ **مدل بارگذاری نشد.**\n\n';
    if (errMsg.includes('WebGPU')) {
      userMsg += 'مرورگر شما از WebGPU پشتیبانی نمی‌کند.\n**راه‌حل:** از Chrome یا Edge جدید روی PC استفاده کنید.';
    } else if (errMsg.includes('fetch') || errMsg.includes('network')) {
      userMsg += 'خطای شبکه. برای اولین بارگذاری به اینترنت نیاز است.';
    } else {
      userMsg += 'جزئیات: ' + errMsg.substring(0, 150);
    }
    addMessage(userMsg, 'bot');
  }
}

// ---- ارسال پیام و دریافت پاسخ ---- 
async function sendMsg() {
  if (isGenerating || !engine) return;
  const text = msgInput.value.trim();
  if (!text) return;

  // نمایش پیام کاربر
  addMessage(text, 'user');
  msgInput.value = '';
  msgInput.style.height = 'auto';

  // اضافه کردن به تاریخچه
  history.push({ role: 'user', content: text });

  // غیرفعال کردن ورودی حین تولید
  isGenerating = true;
  msgInput.disabled = true;
  sendBtn.disabled  = true;
  addTypingIndicator();

  try {
    // ارسال درخواست به مدل با streaming
    const reply = await engine.chat.completions.create({
      messages: history,
      stream: true,
      temperature: 0.7,
      max_tokens: 512,
    });

    // حذف نشانگر تایپ و شروع stream
    removeTypingIndicator();
    const botDiv = addMessage('', 'bot');
    let fullText = '';

    for await (const chunk of reply) {
      const delta = chunk.choices[0]?.delta?.content || '';
      fullText += delta;
      botDiv.innerHTML = simpleMarkdown(fullText);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    // اضافه کردن پاسخ به تاریخچه
    history.push({ role: 'assistant', content: fullText });

    // محدود کردن تاریخچه به 20 پیام آخر برای مدیریت حافظه
    if (history.length > 20) history.splice(0, 2);

  } catch (err) {
    removeTypingIndicator();
    console.error('Generation error:', err);
    addMessage('⚠️ خطا در تولید پاسخ: ' + (err.message || '').substring(0, 100), 'bot');
  } finally {
    isGenerating = false;
    msgInput.disabled = false;
    sendBtn.disabled  = false;
    msgInput.focus();
  }
}

// ---- وضعیت هدر ---- 
function setStatus(state, text) {
  statusDot.className = 'status-dot ' + state;
  statusText.textContent = text;
}

// ---- کنترل کیبورد ----
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ---- شروع بارگذاری ----
window.addEventListener('DOMContentLoaded', () => {
  initEngine();
});
</script>
</body>
</html>
